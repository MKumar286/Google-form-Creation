<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Excel to Form Builder

</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f3f5f7;
padding:20px;
}

.container{

max-width:1400px;
margin:auto;

}

.header{

background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;

}

h1{

margin-bottom:10px;

}

.upload{

background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;

}

input[type=file]{

margin-top:15px;

}

.main{

display:grid;

grid-template-columns:60% 40%;

gap:20px;

}

.left{

background:white;
padding:20px;
border-radius:10px;

}

.right{

background:white;
padding:20px;
border-radius:10px;

}

.question{

border:1px solid #ddd;
padding:15px;
margin-bottom:15px;
border-radius:10px;

}

.question input{

width:100%;
padding:8px;
margin-top:5px;

}

.question select{

width:100%;
padding:8px;
margin-top:5px;

}

.optionsBox{

margin-top:10px;

}

.previewQuestion{

margin-bottom:20px;

}

.resume{

margin-top:20px;
padding:15px;
background:#fafafa;

}

button{

padding:12px 20px;

background:#4285F4;

color:white;

border:none;

border-radius:5px;

cursor:pointer;

margin-top:20px;

}

button:hover{

opacity:.9;

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h1>

Excel to Form Builder

</h1>

<p>

Upload Excel and customize every field.

</p>

</div>

<div class="upload">

<label>

Form Title

</label>

<input
type="text"
id="formTitle"
value="Placement Registration Form">

<br><br>

<label>

Description

</label>

<input
type="text"
id="formDescription"
value="Fill the details carefully">

<br><br>

<input
type="file"
id="excelFile"
accept=".xlsx,.xls,.csv">

</div>

<div class="main">

<div class="left">

<h2>

Detected Questions

</h2>

<br>

<div id="questions">

No file uploaded.

</div>

<div class="resume">

<h3>

Resume Upload

</h3>

<br>

<label>

<input
type="checkbox"
id="resumeCheck">

Ask students to upload Resume PDF

</label>

</div>

<button>

Preview Form

</button>

</div>

<div class="right">

<h2>

Live Preview

</h2>

<br>

<div id="preview">

<h3>

Placement Registration Form

</h3>

<hr>

<br>

Upload Excel to generate preview.

</div>

</div>

</div>

</div>

<script>

let excelData=[];

document
.getElementById("excelFile")
.addEventListener(
"change",

function(e){

let file=e.target.files[0];

let reader=new FileReader();

reader.onload=function(evt){

let data=
new Uint8Array(evt.target.result);

let workbook=
XLSX.read(data,
{type:"array"});

let sheet=
workbook.Sheets[
workbook.SheetNames[0]
];

excelData=
XLSX.utils.sheet_to_json(
sheet,
{header:1}
);

  function displayColumns(){

    if(excelData.length==0) return;

    let headers=excelData[0];

    let html="";

    for(let i=0;i<headers.length;i++){

        html+=`
        <div class="question">

        <label>
        Question Title
        </label>

        <input type="text"
        value="${headers[i]}">

        <br><br>

        <label>
        Question Type
        </label>

        <select>

        <option>Short Answer</option>

        <option>Paragraph</option>

        <option>Multiple Choice</option>

        <option>Checkboxes</option>

        <option>Dropdown</option>

        <option>Date</option>

        <option>Time</option>

        <option>Email</option>

        <option>Phone Number</option>

        <option>Number</option>

        <option>File Upload</option>

        <option>Resume Upload</option>

        <option>Other</option>

        </select>

        <br><br>

        <label>

        <input type="checkbox">

        Required

        </label>

        <br><br>

        <label>

        Options

        </label>

        <input type="text"
        placeholder="Option1,Option2">

        </div>
        `;

    }

    document.getElementById(
    "questions"
    ).innerHTML=html;

    updatePreview();

}

  function updatePreview(){

    let html="";

    html+="<h3>";
    html+=document.getElementById(
    "formTitle"
    ).value;
    html+="</h3>";

    html+="<hr><br>";

    let questions=
    document.querySelectorAll(
    ".question"
    );

    questions.forEach(function(q){

        let title=
        q.querySelector(
        "input[type=text]"
        ).value;

        html+="<div>";

        html+="<b>";
        html+=title;
        html+="</b>";

        html+="<br>";

        html+="____________";

        html+="<br><br>";

        html+="</div>";

    });

    if(
    document.getElementById(
    "resumeCheck"
    ).checked
    ){

        html+="<b>";

        html+="Upload Resume PDF";

        html+="</b>";

    }

    document.getElementById(
    "preview"
    ).innerHTML=html;

}

displayColumns();

};

reader.readAsArrayBuffer(file);

}

);

  document.addEventListener(
"input",
function(){

updatePreview();

});

</script>

</body>

</html>
