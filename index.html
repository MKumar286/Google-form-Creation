<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Excel to Google Form AI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
background:#f5f7fb;
padding:20px;
}

.container{
max-width:1400px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:10px;
}

.subtitle{
text-align:center;
margin-bottom:25px;
color:gray;
}

.uploadBox{

border:3px dashed #4285F4;
background:white;
padding:50px;
text-align:center;
border-radius:15px;
cursor:pointer;

}

.uploadBox:hover{
background:#f8fbff;
}

input[type=file]{
display:none;
}

.uploadIcon{

font-size:50px;
margin-bottom:15px;

}

.fileName{

margin-top:15px;
font-weight:bold;

}

.main{

display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:25px;

}

.card{

background:white;
padding:20px;
border-radius:15px;
box-shadow:0px 5px 15px rgba(0,0,0,.08);

}

.card h2{

margin-bottom:15px;

}

#questions{

max-height:600px;
overflow:auto;

}

.question{

border:1px solid #ddd;
padding:15px;
border-radius:10px;
margin-bottom:10px;

}

.question label{

font-weight:bold;

}

.question select{

width:100%;
padding:8px;
margin-top:8px;

}

.preview{

border:1px solid #ddd;
padding:20px;
border-radius:10px;
background:#fafafa;

}

.btn{

background:#4285F4;
color:white;
padding:12px 20px;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:15px;

}

.btn:hover{

opacity:.9;

}

.actionButtons{

margin-top:20px;

}

#status{

margin-top:15px;
color:green;
font-weight:bold;

}

@media(max-width:900px){

.main{

grid-template-columns:1fr;

}

}

</style>

</head>

<body>

<div class="container">

<h1>Excel to Google Form AI</h1>

<div class="subtitle">
Upload your Excel sheet and generate Google Forms intelligently.
</div>

<label class="uploadBox">

<div class="uploadIcon">
📁
</div>

<h2>Drop Excel File Here</h2>

<p>
or click to browse
</p>

<input type="file"
id="excelFile"
accept=".xlsx,.xls,.csv">

<div class="fileName" id="fileName">

No file selected

</div>

</label>

<div id="status"></div>

<div class="actionButtons">

<button class="btn" id="analyzeBtn">

🤖 Analyze Excel

</button>

<button class="btn">

👀 Preview Form

</button>

<button class="btn">

🚀 Generate Google Form

</button>

</div>

<div class="main">

<div class="card">

<h2>

Suggested Questions

</h2>

<div id="questions">

<div class="question">

Waiting for Excel upload...

</div>

</div>

</div>

<div class="card">

<h2>

Google Form Preview

</h2>

<div class="preview" id="preview">

<h3>Form Title</h3>

<hr><br>

Upload an Excel file to preview the form.

</div>

</div>

</div>

</div>

<script>

let uploadedFile=null;

document
.getElementById("excelFile")
.addEventListener("change",function(e){

uploadedFile=e.target.files[0];

document
.getElementById("fileName")
.innerHTML=uploadedFile.name;

document
.getElementById("status")
.innerHTML="✅ File uploaded successfully.";

});

document
.getElementById("analyzeBtn")
.addEventListener("click",function(){

if(uploadedFile==null){

alert("Please upload Excel file.");

return;

}

document
.getElementById("status")
.innerHTML="🤖 AI is analyzing your Excel...";

});

</script>

</body>

</html>
